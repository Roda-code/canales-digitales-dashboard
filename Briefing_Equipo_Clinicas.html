// Calcular días hasta fecha (Mes-Año)
function diasHasta(mesAno){
  const mm={Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11};
  const [m,y]=mesAno.split('-');
  const t=new Date(parseInt(y),mm[m],1);
  return Math.ceil((t-today)/(1000*60*60*24));
}

function predMeta(proyMar,metaMes){
  const p=(proyMar/metaMes)*100;
  if(p>=95)return{label:'✅ CERRARÁ META',cls:'cg',desc:'Ritmo actual alcanza el objetivo.'};
  if(p>=80)return{label:'⚡ CON ESFUERZO',cls:'cy',desc:`Brecha $${(metaMes-proyMar).toFixed(0)}M.`};
  return{label:'⚠️ META EN RIESGO',cls:'cr',desc:`Brecha $${(metaMes-proyMar).toFixed(0)}M.`};
}
function cicloStatus(c){
  if(c.dscp===0) return {label:'En ciclo',cls:'cg',desc:`Próximo pedido est. ~${c.ciclo_dias}d`};
