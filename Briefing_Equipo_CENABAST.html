function diasHasta(mesAno){
  const mm={Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11};
  const[m,y]=mesAno.split('-');
  const t=new Date(parseInt(y),mm[m],1);
  return Math.ceil((t-today)/(1000*60*60*24));
}

  const p=(proyMar/metaMes)*100;

}

            <td><span class="b ${s.tend.startsWith('+')?'bg':'br'}">${s.tend}</span></td>
            <td style="font-weight:700;color:${+s.mg.replace('%','')>=18?'var(--g)':'var(--y)'}">${s.mg}</td>
            <td style="font-size:10px;color:var(--mu)">${s.tip}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <!-- MÉTRICAS -->
  <div class="card">
    <div class="ch">📊 Indicadores CENABAST</div>
    <div class="cb">
      <div class="mrow"><div class="ml">Avance vs meta</div><div class="bar-bg"><div class="bar-f" style="width:${Math.min(pctMeta,100)}%;background:${pctMeta>=90?'var(--g)':pctMeta>=75?'var(--y)':'var(--r)'}"></div></div><div class="mv ${pctMeta>=90?'cg':pctMeta>=75?'cy':'cr'}">${pctMeta}%</div></div>
      <div class="mrow"><div class="ml">CESFAM activos</div><div class="bar-bg"><div class="bar-f" style="width:${efic}%;background:${efic>=80?'var(--g)':efic>=65?'var(--y)':'var(--r)'}"></div></div><div class="mv ${efic>=80?'cg':efic>=65?'cy':'cr'}">${efic}%</div></div>
      <div class="mrow"><div class="ml">Margen promedio</div><div class="bar-bg"><div class="bar-f" style="width:${(v.mg/35)*100}%;background:var(--g)"></div></div><div class="mv cg">${v.mg}%</div></div>
      <div class="mrow"><div class="ml">Licit. urgentes+vencidas</div><div class="bar-bg"><div class="bar-f" style="width:${Math.min(((urgentes.length+vencidas.length)/5)*100,100)}%;background:${(urgentes.length+vencidas.length)>0?'var(--r)':'var(--g)'}"></div></div><div class="mv ${(urgentes.length+vencidas.length)>0?'cr':'cg'}">${urgentes.length+vencidas.length}</div></div>
      <div class="mrow"><div class="ml">$M en riesgo (contratos)</div><div class="bar-bg"><div class="bar-f" style="width:${Math.min(((valorUrgente+valorRenovar)/valorTotal)*100||0,100)}%;background:var(--r)"></div></div><div class="mv cr">$${valorUrgente+valorRenovar}M</div></div>
    </div>
  </div>

  <!-- ALERTAS -->
  <div class="card">
    <div class="ch ${vencidas.length>0||urgentes.length>0?'r':v.caidos>30?'y':'g'}">⚡ Alertas del Día</div>
    <div class="cb">
      ${vencidas.length>0?`<div class="al r"><strong>🚨 ${vencidas.length} CONTRATO(S) VENCIDO(S)</strong> · ${vencidas.map(c=>c.n).join(', ')}. Verificar urgente si ya está en ChileCompra o hay tiempo de negociar.</div>`:''}
      ${urgentes.filter(c=>diasHasta(c.licit_vence)>0).length>0?`<div class="al r"><strong>🔴 ${urgentes.filter(c=>diasHasta(c.licit_vence)>0).length} licitación(es) urgentes</strong> · Vencen en menos de 30 días. Llamar HOY al encargado de compras. $${valorUrgente}M en juego.</div>`:''}
      ${v.caidos>0?`<div class="al r"><strong>🔴 ${v.caidos} CESFAM sin pedido</strong> · Muchos pueden estar esperando licitación o tener presupuesto bloqueado. Verificar razón.</div>`:''}
      ${renovar.length>0?`<div class="al"><strong>📋 ${renovar.length} contratos por renovar</strong> · $${valorRenovar}M. No urgentes aún, pero gestionar antes de junio para no perder ventana.</div>`:''}
      ${+velPct<-10?`<div class="al r"><strong>▼ Velocidad bajó ${Math.abs(velPct)}%</strong> · Posible impacto de licitaciones en proceso. Verificar con cada CESFAM.</div>`:''}
      <div class="al o"><strong>🌧️ Invierno APS:</strong> En ~10 semanas, TAPSIN sube +80% en CESFAM. Preparar pedidos anticipados para adultos mayores y APS general HOY.</div>
      <div class="al o"><strong>💡 Margen ${v.mg}%:</strong> El mayor del equipo CMK. Mantener mix actual. MABTHERA cayó -27% — verificar si CENABAST central cambió proveedor o formulario.</div>
    </div>
  </div>

  <!-- PLAN ACCIÓN -->
  <div class="card s2">
    <div class="ch y">🎯 Plan de Acción — ${DS[today.getDay()]} ${today.getDate()} ${MS[today.getMonth()]}</div>
    <div class="cb">
      <table class="tbl">
        <thead><tr><th>#</th><th>Acción</th><th>CESFAM</th><th>Tema</th><th>$M Impacto</th><th>Estado</th></tr></thead>
        <tbody>
          ${vencidas[0]?`<tr><td>1</td><td>🚨 Rescatar contrato vencido</td><td>${vencidas[0].n.split(' ').slice(0,2).join(' ')}</td><td style="font-size:10px">Verificar si está en ChileCompra · ${vencidas[0].encargado}</td><td class="r">$${vencidas[0].val_licit}M</td><td><span class="b bdv">CRÍTICO</span></td></tr>`:''}
          ${urgentes.filter(c=>diasHasta(c.licit_vence)>0)[0]?`<tr><td>${vencidas.length>0?2:1}</td><td>🔴 Renovar urgente</td><td>${urgentes.filter(c=>diasHasta(c.licit_vence)>0)[0].n.split(' ').slice(0,2).join(' ')}</td><td style="font-size:10px">Vence en ${diasHasta(urgentes.filter(c=>diasHasta(c.licit_vence)>0)[0].licit_vence)}d · ${urgentes.filter(c=>diasHasta(c.licit_vence)>0)[0].encargado}</td><td class="r">$${urgentes.filter(c=>diasHasta(c.licit_vence)>0)[0].val_licit}M</td><td><span class="b br">HOY</span></td></tr>`:''}
          ${sinCompra[0]?`<tr><td>3</td><td>🔴 Reactivar CESFAM</td><td>${sinCompra[0].n.split(' ').slice(0,2).join(' ')}</td><td style="font-size:10px">${sinCompra[0].dscp}d sin pedido · ${sinCompra[0].sku_perd}</td><td class="r">$${(v.riesgo/v.caidos*1).toFixed(1)}M</td><td><span class="b br">HOY</span></td></tr>`:''}
          ${renovar[0]?`<tr><td>4</td><td>📋 Gestionar renovación</td><td>${renovar[0].n.split(' ').slice(0,2).join(' ')}</td><td style="font-size:10px">Antes de licitación pública · $${renovar[0].val_licit}M</td><td class="r">Continuidad</td><td><span class="b by">SEMANA</span></td></tr>`:''}
          <tr><td>5</td><td>🌧️ Pedido anticipado invierno</td><td>CESFAM activos</td><td style="font-size:10px">TAPSIN NOCH — stock May-Jun APS</td><td class="r">+$${(rate3*0.15).toFixed(1)}M</td><td><span class="b bt">PROPUESTA</span></td></tr>
          <tr><td>6</td><td>💊 Push ACTEMRA APS</td><td>CESFAM con adultos mayores</td><td style="font-size:10px">ACTEMRA 162 MG (+37%) — potencial APS no explotado</td><td class="r">Mg 15%</td><td><span class="b bp">MES</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- AGENDA CONTACTOS DÍA -->
  <div class="card s3">
    <div class="ch o">📞 Agenda de Contactos del Día — ${v.n} · ${cesfams.length} CESFAM · <span style="color:var(--y)">Esperado: $${totalAgendaCen}M</span></div>
    <div class="cb">
      <table class="tbl">
        <thead><tr><th>#</th><th>CESFAM / Consultorio</th><th>Prioridad</th><th>Motivo</th><th>Acción</th><th>Ofrecer / Gestionar</th><th>Dejó de comprar</th><th>$ Esperado</th></tr></thead>
        <tbody>
          ${agendaCen.map((c,i)=>`<tr style="${c.urgColor==='bdv'?'background:rgba(248,81,73,.06)':''}">
            <td style="font-weight:800;color:var(--mu);font-size:12px">${i+1}</td>
            <td>
              <strong>${c.n}</strong>
              <div style="font-size:9px;color:var(--mu);margin-top:1px">${c.encargado}</div>
            </td>
            <td><span class="b ${c.urgColor}">${c.prio}</span></td>
            <td style="font-size:10px;color:var(--mu);max-width:110px">${c.motivo}</td>
            <td style="font-size:10px;color:var(--li)">${c.accion}</td>
            <td>
              <span style="font-size:10px;color:var(--o);font-weight:700">${c.sku_act}</span>
              ${c.prio==='ACTIVO'||c.prio==='SEGUIMIENTO'?'<div style="font-size:9px;color:var(--p)">+ TAPSIN NOCH invierno</div>':''}
              ${c.urgColor==='bdv'||c.urgColor==='br'?`<div style="font-size:9px;color:var(--y)">Licit. $${c.val_licit}M</div>`:''}
            </td>
            <td>
              ${c.dscp>0
                ?`<span style="font-size:10px;color:var(--r)">${c.sku_perd}</span><div style="font-size:9px;color:var(--mu)">${c.dscp}d sin pedir</div>`
                :'<span style="font-size:10px;color:var(--mu)">—</span>'}
            </td>
            <td class="r">
              <span style="font-size:14px;font-weight:800;color:${c.urgColor==='bdv'?'var(--r)':c.urgColor==='br'?'var(--r)':c.urgColor==='by'?'var(--y)':'var(--g)'}">$${c.esperado}M</span>
              <div style="font-size:9px;color:var(--mu)">${c.d_licit<=0?'VENCIDA':c.d_licit+'d para licit.'}</div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);flex-wrap:wrap;gap:8px">
        <div style="display:flex;gap:14px;font-size:10px;color:var(--mu);flex-wrap:wrap">
          <span>🚨 Vencida: ${agendaCen.filter(c=>c.prio==='VENCIDA').length}</span>
          <span>🔴 Urgente: ${agendaCen.filter(c=>c.prio.includes('URGENTE')).length}</span>
          <span>⚠️ Reactivar: ${agendaCen.filter(c=>c.prio.includes('REACTIVAR')).length}</span>
          <span>📋 Renovar: ${agendaCen.filter(c=>c.prio==='RENOVAR').length}</span>
          <span>✅ Activo: ${agendaCen.filter(c=>c.prio==='ACTIVO').length}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:10px;color:var(--mu)">Esperado total hoy:</div>
          <div style="font-size:22px;font-weight:900;color:var(--y)">$${totalAgendaCen}M</div>
          <div style="font-size:10px;color:var(--mu)">/ meta $${v.meta_mes}M mes</div>
        </div>
      </div>
    </div>
  </div>

  <!-- EJECUCIÓN PRESUPUESTARIA -->
  <div class="card s2">
    <div class="ch ${saldoDisp>200?'g':'y'}">💰 Ejecución Presupuestaria Municipal — Saldo Disponible Año 2026</div>
    <div class="cb">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
        <div class="pred-box">
          <div class="pred-label">Presup. Anual Total Cartera</div>
          <div class="pred-val ct">$${(presupTotalAnual/1000).toFixed(0)}k</div>
          <div class="pred-sub">${cesfams.length} CESFAM/consultorio</div>
        </div>
        <div class="pred-box">
          <div class="pred-label">Saldo Disponible (sin ejecutar)</div>
          <div class="pred-val cg">$${saldoDisp}M</div>
          <div class="pred-sub">Oportunidad directa este año</div>
        </div>
        <div class="pred-box">
          <div class="pred-label">CESFAM con &lt;60% ejecución</div>
          <div class="pred-val ${cesfamsBajoEjec.length>0?'cy':'cg'}">${cesfamsBajoEjec.length}</div>
          <div class="pred-sub">${cesfamsBajoEjec.length>0?'Mayor oportunidad de venta':'Todos bien ejecutados'}</div>
        </div>
      </div>
      <table class="tbl">
        <thead><tr><th>CESFAM</th><th>Presup. Anual</th><th>% Ejecutado</th><th>Saldo</th><th>Acción</th></tr></thead>
        <tbody>
          ${cesfams.slice().sort((a,b)=>a.ejec_pct-b.ejec_pct).map(c=>{
            const presupAnual=c.presup_mens*12;
            const saldo=Math.round(presupAnual*(1-c.ejec_pct/100));
            return `<tr>
              <td><strong style="font-size:10px">${c.n}</strong><div style="font-size:9px;color:var(--mu)">${c.encargado}</div></td>
              <td class="r" style="font-weight:700">$${presupAnual}M</td>
              <td>
                <div style="display:flex;align-items:center;gap:6px">
                  <div class="bar-bg"><div class="bar-f" style="width:${c.ejec_pct}%;background:${c.ejec_pct>=80?'var(--g)':c.ejec_pct>=60?'var(--y)':'var(--r)'}"></div></div>
                  <span style="font-size:11px;font-weight:700;color:${c.ejec_pct>=80?'var(--g)':c.ejec_pct>=60?'var(--y)':'var(--r)'}">${c.ejec_pct}%</span>
                </div>
              </td>
              <td class="r"><strong style="color:${saldo>100?'var(--g)':saldo>50?'var(--y)':'var(--mu)'}">$${saldo}M</strong></td>
              <td style="font-size:10px;color:var(--mu)">${c.ejec_pct<50?'🔥 Presionar pedido — saldo alto disponible':c.ejec_pct<70?'Ofrecer producto nuevo / volumen extra':'Mantenimiento y renovación oportuna'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      ${cesfamsBajoEjec.length>0?`<div class="al g" style="margin-top:7px">💡 <strong>Oportunidad inmediata:</strong> ${cesfamsBajoEjec.map(c=>c.n.split(' ').slice(0,2).join(' ')).join(', ')} tienen saldo presupuestario sin ejecutar. Contactar esta semana con propuesta específica.</div>`:''}
    </div>
  </div>

  <!-- EFICIENCIA VISITAS CENABAST -->
  <div class="card">
    <div class="ch ${visEficCen>=85?'g':visEficCen>=70?'y':'r'}">📅 Visitas y Cobertura Territorial</div>
    <div class="cb">
      <div class="pred-box">
        <div class="pred-label">Visitas realizadas / planeadas (Mar)</div>
        <div class="pred-val ${visEficCen>=85?'cg':visEficCen>=70?'cy':'cr'}">${v.v_real} / ${v.v_plan}</div>
        <div class="pred-sub">${visEficCen}% · ${v.v_plan-v.v_real} pendiente${v.v_plan-v.v_real!==1?'s':''} — ${v.cli} CESFAM en cartera</div>
      </div>
      <div class="pred-box">
        <div class="pred-label">Cobertura cartera</div>
        <div class="pred-val cy">${Math.round((v.v_real/v.cli)*100)}%</div>
        <div class="pred-sub">${v.v_real} visitados de ${v.cli} CESFAM totales este mes</div>
      </div>
      ${visEficCen<70?`<div class="al r">⚠️ Baja cobertura. CESFAM no visitados tienen mayor riesgo de ser captados por competencia antes de licitación.</div>`:''}
      <div style="font-size:10px;color:var(--mu);margin-top:6px">Sin visita reciente: <strong style="color:var(--r)">${cesfams.filter(c=>c.dscp>10).map(c=>c.n.split(' ').slice(0,2).join(' ')).join(', ')||'Todos visitados ✅'}</strong></div>
    </div>
  </div>

  <!-- RANKING EQUIPO CENABAST -->
  <div class="card">
    <div class="ch o">👥 Ranking Equipo CENABAST Q1-26</div>
    <div class="cb" style="padding:8px 10px">
      ${rnk.map((x,i)=>{
        const max=rnk[0].rev;
        const isMe=x.n===v.n;
        const xRate3=x.r3/DIAS_T, xRate2=x.r2/20;
        const xVelPct=xRate2>0?(((xRate3-xRate2)/xRate2)*100).toFixed(0):0;
        const xEfic=x.cli>0?Math.round(((x.cli-x.caidos)/x.cli)*100):100;
        return `<div class="rk-row">
          <div class="rk-n" style="color:${i===0?'var(--y)':'var(--mu)'};font-size:9px">#${i+1}</div>
          <div style="flex:1;font-size:11px;font-weight:${isMe?700:400};color:${isMe?'var(--o)':'var(--li)'}">${x.n.split(' ').slice(0,2).join(' ')}${isMe?' ← tú':''}</div>
          <span style="font-size:9px;color:var(--mu);width:55px">${x.cli} CESFAM</span>
          <span style="font-size:8px;color:${+xVelPct>=0?'var(--g)':'var(--r)'};font-weight:700;width:42px;text-align:right">${+xVelPct>=0?'↑+':'↓'}${Math.abs(xVelPct)}%</span>
          <div style="width:70px;background:#21262d;border-radius:99px;height:5px;margin:0 6px"><div style="width:${(x.rev/max)*100}%;height:100%;border-radius:99px;background:${isMe?'var(--o)':'rgba(251,133,0,.35)'}"></div></div>
          <div style="font-size:10px;font-weight:700;width:58px;text-align:right;color:${isMe?'var(--o)':'var(--li)'}">$${(x.rev/1000).toFixed(2)}B</div>
        </div>`;
      }).join('')}
      <div style="margin-top:6px;font-size:9px;color:var(--mu)">Flecha = velocidad Mar vs Feb. CESFAM = cartera total del vendedor.</div>
    </div>
  </div>

  <!-- ALERTAS CHILECHILE COMPRA — LICITACIONES NUEVAS -->
  <div class="card s2">
    <div class="ch ${myChileCompra.length>0?'o':'g'}">🔍 ChileCompra — Licitaciones Nuevas Detectadas · $${valChileCompra}M oportunidad</div>
    <div class="cb">
      ${myChileCompra.length===0
        ?'<div class="al g">✅ Sin licitaciones abiertas asignadas esta semana. Revisar portal ChileCompra regularmente.</div>'
        :`<div class="al o" style="margin-bottom:8px">📢 <strong>${myChileCompra.length} licitacion${myChileCompra.length!==1?'es':''} activa${myChileCompra.length!==1?'s':''}</strong> en ChileCompra para tu zona — valor total estimado: <strong>$${valChileCompra}M</strong>. Las ABIERTA requieren propuesta técnica URGENTE.</div>
        <table class="tbl">
          <thead><tr><th>ID Licitación</th><th>Municipalidad</th><th>Producto</th><th>Val. Est.</th><th>Cierre</th><th>Match</th><th>Estado</th></tr></thead>
          <tbody>
            ${myChileCompra.map(l=>`<tr style="${l.estado==='ABIERTA'?'background:rgba(251,133,0,.04)':''}">
              <td style="font-size:9px;color:var(--mu);font-family:monospace">${l.id}</td>
              <td><strong style="font-size:10px">${l.muni.replace('Municipalidad ','')}</strong></td>
              <td style="font-size:10px;color:var(--t)">${l.producto}</td>
              <td class="r"><strong style="color:var(--y)">$${l.val_est}M</strong></td>
              <td><span class="b ${l.estado==='ABIERTA'?'br':'by'}" style="font-size:8px">${l.fecha_cierre}</span></td>
              <td><span class="b ${l.match==='Alto'?'bg':'by'}">${l.match}</span></td>
              <td><span class="b ${l.estado==='ABIERTA'?'br':'by'}">${l.estado}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="al o" style="margin-top:7px">💡 <strong>Proceso:</strong> (1) Descargar bases en chilechile.cl · (2) Preparar oferta técnica + precio · (3) Subir propuesta antes del cierre. Match "Alto" = productos que ya vendemos. Priorizar ABIERTA.</div>`
      }
    </div>
  </div>

  <!-- NOTAS -->
  <div class="card">
    <div class="ch">📝 Notas / Compromisos</div>
    <div class="cb">
      <textarea placeholder="Renovaciones gestionadas, OC enviadas, reuniones con encargados..."></textarea>
      <div style="margin-top:6px"><div style="font-size:9px;color:var(--mu);margin-bottom:3px">SEGUIMIENTOS SEMANA</div><textarea placeholder="1.&#10;2.&#10;3." style="min-height:45px"></textarea></div>
    </div>
  </div>
</div>`;
}
render();
</script>
</body>
</html>
