      ${+velPct>=5?`<div class="al g"><strong>▲ Acelerando +${velPct}%</strong> · Ritmo Mar supera Feb. Manten y amplía cartera para invierno.</div>`:''}
      <div class="al p"><strong>🌧️ Temporada:</strong> Faltan ~10 semanas para el peak de invierno. TAPSIN NOCH/DIA subirán +80% en junio. Proponer pedido anticipado HOY en tus farmacias activas.</div>
      <div class="al t"><strong>💡 Margen:</strong> Tu margen (${v.mg}%) ${v.mg<12?'está bajo. Priorizar CLEXANE 40 (18%) y BAVENCIO (25%+) sobre volumen puro.':v.mg>=14?'es bueno. Ampliar con specialty si tienes acceso.':'está en rango. Mejorar con productos Rx.'}</div>
      ${altaComp>0?`<div class="al r"><strong>🏪 ${altaComp} farmacias con alta presión de cadenas</strong> · Diferenciarse por precio, servicio y velocidad de despacho.</div>`:''}
    </div>
  </div>

  <!-- PLAN ACCIÓN -->
  <div class="card s2">
    <div class="ch y">🎯 Plan de Acción Hoy — ${DS[today.getDay()]} ${today.getDate()} ${MS[today.getMonth()]}</div>
    <div class="cb">
      <table class="tbl">
        <thead><tr><th>#</th><th>Acción</th><th>Punto de Venta</th><th>Producto</th><th>Impacto Est.</th><th>Estado</th></tr></thead>
        <tbody>
          ${reactivar[0]?`<tr><td>1</td><td>🔴 Reactivar urgente</td><td>${reactivar[0].n.split(' ').slice(0,3).join(' ')}</td><td style="font-size:10px">${reactivar[0].sig_sku} · ${reactivar[0].win_back}% prob.</td><td class="r">$${(v.meta_mes/DIAS_M*0.4).toFixed(0)}M</td><td><span class="b br">HOY</span></td></tr>`:''}
          ${reactivar[1]?`<tr><td>2</td><td>🔴 Reactivar</td><td>${reactivar[1].n.split(' ').slice(0,3).join(' ')}</td><td style="font-size:10px">${reactivar[1].sig_sku} · ${reactivar[1].win_back}% prob.</td><td class="r">$${(v.meta_mes/DIAS_M*0.3).toFixed(0)}M</td><td><span class="b br">HOY</span></td></tr>`:''}
          ${creciendo[0]?`<tr><td>3</td><td>🚀 Ampliar pedido</td><td>${creciendo[0].n.split(' ').slice(0,3).join(' ')}</td><td style="font-size:10px">TAPSIN NACH + DIA (volumen invierno)</td><td class="r">$${(v.meta_mes/DIAS_M*0.25).toFixed(0)}M</td><td><span class="b bg">AMPLIAR</span></td></tr>`:''}
          <tr><td>${reactivar.length>0?reactivar.length+1:1}</td><td>🌧️ Pedido anticipado invierno</td><td>Top 3 farmacias activas</td><td style="font-size:10px">TAPSIN NACH/DIA — stock May-Jun</td><td class="r">$${(v.meta_mes/DIAS_M*0.3).toFixed(0)}M</td><td><span class="b bp">PROPONER</span></td></tr>
          <tr><td>${reactivar.length>0?reactivar.length+2:2}</td><td>💰 Recuperar margen</td><td>Cualquier farmacia activa</td><td style="font-size:10px">BAVENCIO (25%mg) / CLEXANE (18%mg)</td><td class="r">Mg +18-25%</td><td><span class="b bt">SEMANA</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- RUTA SUGERIDA -->
  <div class="card s3">
    <div class="ch o">🗺️ Ruta Sugerida del Día — ${v.zona} · ${farmas.length} ${tipoLabel.toLowerCase()} · <span style="color:var(--y)">Esperado: $${totalRuta}M</span> <span style="color:var(--mu);font-size:9px;font-weight:400;margin-left:8px">Meta diaria: $${metaDiaria}M · Cobertura: ${Math.round((totalRuta/metaDiaria)*100)}%</span></div>
    <div class="cb">
      <table class="tbl">
        <thead><tr><th>#</th><th>Farmacia</th><th>Prioridad</th><th>Motivo</th><th>Acción</th><th>Ofrecer HOY</th><th>Dejó de comprar</th><th>Esperado</th></tr></thead>
        <tbody>
          ${routeData.map((f,i)=>`<tr>
            <td style="font-weight:800;color:var(--mu);font-size:12px">${i+1}</td>
            <td>
              <strong>${f.n}</strong>
              <div style="font-size:9px;color:var(--mu);margin-top:1px">${compLabel(f.comp)} competencia · ${f.seg}</div>
            </td>
            <td><span class="b ${f.urgColor}">${f.prio}</span></td>
            <td style="font-size:10px;color:var(--mu);max-width:120px">${f.motivo}</td>
            <td style="font-size:10px;color:var(--li)">${f.accion}</td>
            <td>
              <span style="font-size:10px;color:var(--g);font-weight:700">${f.sig_sku}</span>
              ${f.prio==='AMPLIAR'?'<div style="font-size:9px;color:var(--p)">+ TAPSIN NOCH (invierno)</div>':''}
            </td>
            <td>
              ${f.dscp>0
                ?`<span style="font-size:10px;color:var(--r)">${f.sku}</span><div style="font-size:9px;color:var(--mu)">${f.dscp}d sin pedir</div>`
                :'<span style="font-size:10px;color:var(--mu)">—</span>'}
            </td>
            <td class="r">
              <span style="font-size:14px;font-weight:800;color:var(--y)">$${f.esperado}M</span>
              ${f.win_back&&f.dscp>0?`<div style="font-size:9px;color:var(--mu)">${f.win_back}% prob.</div>`:''}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);flex-wrap:wrap;gap:8px">
        <div style="display:flex;gap:14px;font-size:10px;color:var(--mu)">
          <span>🔴 Urgente: ${routeData.filter(f=>f.prio==='URGENTE').length}</span>
          <span>⚡ Riesgo: ${routeData.filter(f=>f.prio==='RIESGO'||f.prio==='SEGUIMIENTO').length}</span>
          <span>🚀 Ampliar: ${routeData.filter(f=>f.prio==='AMPLIAR').length}</span>
          <span>✅ Mantener: ${routeData.filter(f=>f.prio==='MANTENER').length}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:10px;color:var(--mu)">Total esperado:</div>
          <div style="font-size:22px;font-weight:900;color:${parseFloat(totalRuta)>=parseFloat(metaDiaria)?'var(--g)':parseFloat(totalRuta)>=parseFloat(metaDiaria)*0.8?'var(--y)':'var(--r)'}">$${totalRuta}M</div>
          <div style="font-size:10px;color:var(--mu)">/ meta $${metaDiaria}M</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CARTERA FINANCIERA -->
  <div class="card s3">
    <div class="ch ${+totalDeuda>10?'r':+totalDeuda>0?'y':'g'}">💳 Estado Financiero Cartera — Crédito y Deuda Vencida · ${tipoLabel}</div>
    <div class="cb">
      <table class="tbl">
        <thead><tr><th>${tipoLabel}</th><th>Plazo Crédito</th><th>Deuda Vencida</th><th>Estado Cobro</th><th>Recomendación</th></tr></thead>
        <tbody>
          ${farmas.map(f=>`<tr>
            <td><strong>${f.n.split(' ').slice(0,3).join(' ')}</strong><div style="font-size:9px;color:var(--mu)">${f.seg}</div></td>
            <td><span class="b ${f.credito<=30?'bg':f.credito<=60?'by':'br'}">${f.credito}d</span></td>
            <td class="r">${(f.deuda||0)>0?`<span class="b ${f.deuda>5?'br':'by'}">$${f.deuda}M</span>`:'<span class="b bg">Al día</span>'}</td>
            <td>${(f.deuda||0)>5?'<span class="b br">COBRAR HOY</span>':(f.deuda||0)>0?'<span class="b by">COBRAR</span>':'<span class="b bg">OK</span>'}</td>
            <td style="font-size:10px;color:var(--mu)">${(f.deuda||0)>5?'No despachar sin pago. Contactar hoy.':(f.deuda||0)>0?'Acordar pago en próxima visita.':'Condiciones normales. Mantener.'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${+totalDeuda>0?`<div class="al r" style="margin-top:8px">⚠️ Deuda total cartera: <strong>$${totalDeuda}M</strong> en ${clientesDeuda} cliente${clientesDeuda!==1?'s':''}. Coordinar con cobranza antes del próximo despacho.</div>`:'<div class="al g" style="margin-top:6px">✅ Cartera al día — sin deuda vencida. Excelente salud financiera.</div>'}
    </div>
  </div>

  <!-- DEVOLUCIONES DETALLE -->
  <div class="card s2">
    <div class="ch ${+montoTotalDev>3?'r':+montoTotalDev>0?'y':'g'}">↩️ Devoluciones del Mes — Detalle por SKU y Cliente · Total devuelto: $${montoTotalDev}M</div>
    <div class="cb">
      ${devItems.length===0
        ?'<div class="al g">✅ Sin devoluciones registradas este mes. Excelente gestión de inventario de clientes.</div>'
        :`<table class="tbl">
          <thead><tr><th>Cliente</th><th>SKU Devuelto</th><th>Und.</th><th>Monto</th><th>Motivo</th><th>Acción</th></tr></thead>
          <tbody>
            ${devItems.map(d=>`<tr>
              <td><strong style="font-size:10px">${d.f.split(' ').slice(0,4).join(' ')}</strong></td>
              <td style="font-size:10px;color:var(--r);font-weight:600">${d.sku}</td>
              <td class="r" style="font-size:10px;color:var(--mu)">${d.und} u.</td>
              <td class="r"><span class="b br">$${d.monto}M</span></td>
              <td style="font-size:10px;color:var(--mu)">${d.motivo}</td>
              <td style="font-size:10px;color:var(--y)">${d.motivo.includes('Sobrestock')?'Revisar política consignación':d.motivo.includes('Vencimiento')?'Ajustar tamaño pedido':'Verificar con logística'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="al ${+montoTotalDev>3?'r':''}" style="margin-top:7px">⚠️ SKU con mayor devolución: <strong>${skuDevFrecuente}</strong> · Total: <strong>$${montoTotalDev}M</strong>. ${+montoTotalDev>3?'Revisar política de consignación y ajustar volúmenes en próximas OC.':'Nivel dentro de rango aceptable (&lt;2% revenue).'}</div>`
      }
    </div>
  </div>

  <!-- ALERTAS CADUCIDAD STOCK -->
  <div class="card">
    <div class="ch ${cadItems.length>1?'r':cadItems.length===1?'y':'g'}">⏰ Alertas de Caducidad de Stock en Clientes</div>
    <div class="cb">
      ${cadItems.length===0
        ?'<div class="al g">✅ Sin alertas de caducidad detectadas en cartera activa este mes.</div>'
        :cadItems.map(c=>`<div class="al r" style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
            <div>
              <strong style="font-size:11px">${c.f.split(' ').slice(0,4).join(' ')}</strong>
              <div style="font-size:11px;color:var(--r);font-weight:700;margin-top:1px">${c.sku}</div>
              <div style="font-size:10px;color:var(--mu);margin-top:2px">${c.und} unidades · vence en <strong style="color:${c.vence_dias<=30?'var(--r)':'var(--y)'}">${c.vence_dias} días</strong></div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <span class="b ${c.vence_dias<=30?'br':'by'}" style="display:block;margin-bottom:3px">${c.vence_dias}d</span>
              <span style="font-size:9px;color:var(--mu)">→ ${c.accion}</span>
            </div>
          </div>
        </div>`).join('')
      }
    </div>
  </div>

  <!-- NOTAS -->
  <div class="card">
    <div class="ch">📝 Notas del Día</div>
    <div class="cb">
      <textarea placeholder="Acuerdos, OC pendientes, seguimientos..."></textarea>
      <div style="margin-top:6px"><div style="font-size:9px;color:var(--mu);margin-bottom:3px">PRIORIDADES MAÑANA</div><textarea placeholder="1.&#10;2.&#10;3." style="min-height:45px"></textarea></div>
    </div>
  </div>
</div>`;
}
render();
</script>
</body>
</html>
