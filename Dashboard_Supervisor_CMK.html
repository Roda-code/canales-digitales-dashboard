  .logo{font-size:14px;font-weight:800;background:linear-gradient(90deg,var(--g),var(--t),var(--o));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
  .logo span{-webkit-text-fill-color:var(--mu);background:none;font-weight:400;font-size:11px;margin-left:6px;}
  .dtag{background:var(--c2);border:1px solid var(--bd);padding:5px 11px;border-radius:6px;font-size:11px;color:var(--mu);}

  .tab-bar{background:var(--c1);border-bottom:1px solid var(--bd);padding:0 18px;display:flex;gap:0;}
  .tab{padding:9px 16px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--mu);transition:color .15s;}
  .tab:hover{color:var(--tx);}
  .tab.act-g{color:var(--g);border-color:var(--g);}
  .tab.act-t{color:var(--t);border-color:var(--t);}
  .tab.act-a{color:var(--tx);border-color:var(--tx);}
  .pg{padding:12px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .s2{grid-column:span 2;} .s3{grid-column:span 3;}
  .card{background:var(--c1);border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
  .ch{background:var(--c2);padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--bd);}
  .ch.g{color:var(--g);}.ch.t{color:var(--t);}.ch.y{color:var(--y);}.ch.r{color:var(--r);}.ch.p{color:var(--p);}.ch.o{color:var(--o);}.ch.mu{color:var(--mu);}
  .cb{padding:11px 12px;}
  .ks{display:grid;gap:8px;grid-column:span 3;}
  .kp{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:9px 10px;text-align:center;}
  .kp.g{border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.04);}
  .kp.t{border-color:rgba(46,168,204,.3);background:rgba(46,168,204,.04);}
  .kp.o{border-color:rgba(251,133,0,.3);background:rgba(251,133,0,.04);}
  .kl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
  .kv{font-size:18px;font-weight:800;line-height:1;} .ksb{font-size:9px;color:var(--mu);margin-top:2px;}
  .cg{color:var(--g)!important;}.cr{color:var(--r)!important;}.cy{color:var(--y)!important;}.ct{color:var(--t)!important;}.cp{color:var(--p)!important;}.co{color:var(--o)!important;}
  .tbl{width:100%;border-collapse:collapse;}
  .tbl th{background:var(--c2);color:var(--mu);font-size:9px;text-transform:uppercase;padding:5px 7px;text-align:left;border-bottom:1px solid var(--bd);font-weight:600;}
  .tbl td{padding:5px 7px;border-bottom:1px solid #1c2128;font-size:11px;color:var(--li);vertical-align:middle;}
  .tbl tr:last-child td{border-bottom:none;} .r{text-align:right;}
  .b{display:inline-block;padding:2px 6px;border-radius:99px;font-size:9px;font-weight:700;}
  .bg{background:rgba(63,185,80,.15);color:var(--g);}.br{background:rgba(248,81,73,.15);color:var(--r);}
  .by{background:rgba(210,153,34,.15);color:var(--y);}.bt{background:rgba(46,168,204,.15);color:var(--t);}
  .bo{background:rgba(251,133,0,.15);color:var(--o);}.bp{background:rgba(163,113,247,.15);color:var(--p);}
  .bmu{background:rgba(139,148,158,.12);color:var(--mu);}

  .bar-f{height:100%;border-radius:99px;}
  .rk-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #1c2128;}
  .rk-row:last-child{border:none;}
  .rk-n{font-size:10px;font-weight:700;color:var(--mu);width:20px;flex-shrink:0;}
  .rk-name{font-size:11px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .ac-r{background:rgba(248,81,73,.2);color:var(--r);}
  .ac-y{background:rgba(210,153,34,.2);color:var(--y);}
